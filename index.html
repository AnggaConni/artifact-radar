<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artifact Radar Global Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-red-600 p-2 rounded-lg text-white font-bold">AR</div>
                <h1 class="text-xl font-bold tracking-tight">Artifact <span class="text-red-600">Radar</span></h1>
            </div>
            <div id="status-bar" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                Connecting...
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 text-center">
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <p class="text-xs font-bold text-slate-400 uppercase">Total Intelligence</p>
                <p id="stat-total" class="text-3xl font-black mt-2">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <p class="text-xs font-bold text-red-400 uppercase">High Risk Alerts</p>
                <p id="stat-risk" class="text-3xl font-black mt-2 text-red-600">0</p>
            </div>
            <div id="stat-news-box" class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <p class="text-xs font-bold text-blue-400 uppercase">News & Reports</p>
                <p id="stat-news" class="text-3xl font-black mt-2 text-blue-600">0</p>
            </div>
        </div>

        <!-- Dashboard Grid -->
        <div id="container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Data will be loaded here -->
        </div>
    </main>

    <script>
        async function loadData() {
            try {
                const res = await fetch('data.json');
                const data = await res.json();
                
                // Urutkan berdasarkan waktu terbaru
                data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                document.getElementById('stat-total').innerText = data.length;
                document.getElementById('stat-risk').innerText = data.filter(i => i.risk_score >= 8).length;
                document.getElementById('stat-news').innerText = data.filter(i => i.source_type === 'News').length;
                document.getElementById('status-bar').innerText = "Live: Data Synchronized";

                const container = document.getElementById('container');
                container.innerHTML = '';

                data.forEach(item => {
                    const typeColor = item.source_type === 'News' ? 'bg-blue-100 text-blue-700' : 
                                     item.source_type === 'Forum' ? 'bg-amber-100 text-amber-700' : 
                                     'bg-red-100 text-red-700';
                    
                    const card = `
                        <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300">
                            <div class="p-6">
                                <div class="flex justify-between items-center mb-4">
                                    <span class="text-[10px] font-black px-2 py-1 rounded-full uppercase tracking-tighter ${typeColor}">
                                        ${item.source_type}
                                    </span>
                                    <span class="text-[10px] font-bold text-slate-400 uppercase">Score: ${item.risk_score}/10</span>
                                </div>
                                <h3 class="font-bold text-lg mb-2 leading-tight">${item.item_name}</h3>
                                <p class="text-xs text-slate-500 font-bold mb-4">Source: ${item.source_name}</p>
                                
                                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 mb-4">
                                    <p class="text-[10px] font-black text-slate-400 uppercase mb-1">AI Assessment</p>
                                    <p class="text-xs text-slate-600 leading-relaxed italic">"${item.reason}"</p>
                                </div>

                                <a href="${item.source_link}" target="_blank" class="block w-full text-center bg-slate-900 text-white text-xs font-bold py-3 rounded-xl hover:bg-red-600 transition-colors">
                                    BUKA SUMBER →
                                </a>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            } catch (e) {
                console.error(e);
            }
        }
        window.onload = loadData;
    </script>
</body>
</html>
