<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Artifact Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .risk-gradient-10 { background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%); }
        .risk-gradient-low { background: linear-gradient(135deg, #10b981 0%, #065f46 100%); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-red-600 p-2 rounded-lg text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Artifact Monitor <span class="text-red-600">Global</span></h1>
            </div>
            <div id="last-update" class="text-xs text-slate-500 bg-slate-100 px-3 py-1 rounded-full">
                Memuat data...
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Stats Summary -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-sm font-medium text-slate-500">Total Listing Dipantau</p>
                <p id="stat-total" class="text-3xl font-bold mt-1">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-sm font-medium text-slate-500">Dugaan Artefak Asli</p>
                <p id="stat-authentic" class="text-3xl font-bold mt-1 text-red-600">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-sm font-medium text-slate-500">Replika/Irrelevant</p>
                <p id="stat-safe" class="text-3xl font-bold mt-1 text-emerald-600">0</p>
            </div>
        </div>

        <!-- Filter Controls -->
        <div class="flex flex-wrap gap-3 mb-6">
            <button onclick="filterData('all')" class="px-4 py-2 rounded-xl bg-slate-900 text-white text-sm font-medium shadow-sm hover:bg-slate-800 transition">Semua</button>
            <button onclick="filterData('Authentic (Suspected)')" class="px-4 py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 transition">Hanya Dugaan Asli</button>
            <button onclick="filterData('Replica')" class="px-4 py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 transition">Hanya Replika</button>
        </div>

        <!-- Artifact Grid -->
        <div id="artifact-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cards will be injected here -->
            <div class="col-span-full py-20 text-center">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-current border-t-transparent text-slate-400 rounded-full" role="status"></div>
                <p class="mt-4 text-slate-500">Menghubungkan ke database...</p>
            </div>
        </div>
    </main>

    <script>
        let allData = [];

        async function loadData() {
            try {
                const response = await fetch('data.json');
                const historyResp = await fetch('history.json');
                
                allData = await response.json();
                const history = await historyResp.json();

                // Update Stats
                document.getElementById('stat-total').textContent = allData.length;
                document.getElementById('stat-authentic').textContent = allData.filter(i => i.status === 'Authentic (Suspected)').length;
                document.getElementById('stat-safe').textContent = allData.filter(i => i.status !== 'Authentic (Suspected)').length;
                
                // Update Timestamp
                const date = new Date(history.last_crawl_date);
                document.getElementById('last-update').textContent = `Update Terakhir: ${date.toLocaleString('id-ID')}`;

                renderCards(allData);
            } catch (error) {
                console.error('Gagal memuat data:', error);
                document.getElementById('artifact-container').innerHTML = `
                    <div class="col-span-full bg-red-50 p-8 rounded-2xl border border-red-100 text-center">
                        <p class="text-red-700 font-medium">Gagal memuat data.json</p>
                        <p class="text-red-600 text-sm mt-1">Pastikan crawler sudah berjalan sukses di GitHub Actions.</p>
                    </div>
                `;
            }
        }

        function renderCards(data) {
            const container = document.getElementById('artifact-container');
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = `<p class="col-span-full text-center text-slate-400 py-10">Tidak ada data ditemukan.</p>`;
                return;
            }

            data.forEach(item => {
                const isHighRisk = item.risk_score >= 7;
                const riskColor = isHighRisk ? 'text-red-600 bg-red-50' : 'text-emerald-600 bg-emerald-50';
                const dotColor = isHighRisk ? 'bg-red-500' : 'bg-emerald-500';

                const card = `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition-shadow group">
                        <div class="p-5">
                            <div class="flex justify-between items-start mb-4">
                                <span class="text-xs font-bold uppercase tracking-wider ${riskColor} px-2.5 py-1 rounded-lg">
                                    ${item.status}
                                </span>
                                <div class="flex items-center gap-1.5">
                                    <span class="w-2 h-2 rounded-full ${dotColor} animate-pulse"></span>
                                    <span class="text-xs font-bold text-slate-400">SCORE: ${item.risk_score}/10</span>
                                </div>
                            </div>
                            
                            <h3 class="font-bold text-lg mb-1 group-hover:text-red-600 transition-colors">${item.item_name}</h3>
                            <p class="text-2xl font-black text-slate-800 mb-4">$${item.price_usd.toLocaleString()}</p>
                            
                            <div class="bg-slate-50 p-3 rounded-xl">
                                <p class="text-xs text-slate-500 font-semibold mb-1 uppercase">Analisis AI:</p>
                                <p class="text-sm text-slate-600 italic leading-relaxed">"${item.reason}"</p>
                            </div>
                        </div>
                        <div class="px-5 py-3 bg-slate-50 border-t border-slate-100 flex justify-between items-center">
                            <span class="text-[10px] font-bold text-slate-400 uppercase">Monitoring Active</span>
                            <button class="text-xs font-bold text-slate-900 hover:underline">Detail Listing →</button>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        function filterData(status) {
            if (status === 'all') {
                renderCards(allData);
            } else {
                const filtered = allData.filter(item => item.status === status);
                renderCards(filtered);
            }
        }

        // Initialize
        window.onload = loadData;
    </script>
</body>
</html>
