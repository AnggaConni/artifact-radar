name: Artifact Radar Auto-Crawler

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-scraper-and-ai:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          # Perbaikan: Jangan gunakan 'cache' jika tidak ada requirements.txt
          # Ini penyebab error "No file matched"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai requests beautifulsoup4

      - name: Run Scraper & Gemini AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data.json history.json || true
          
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan data."
          else
            git commit -m "Auto-update artifact data & history [skip ci]"
            git push origin main
          fi
