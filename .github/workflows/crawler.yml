name: Artifact Radar Auto-Crawler

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-scraper-and-ai:
    runs-on: ubuntu-latest
    
    # Memberikan izin explisit untuk menulis ke repository
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Sangat penting: memastikan token digunakan untuk push nanti
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Run Scraper & Gemini AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Gunakan status untuk mengecek perubahan secara lebih aman
          git add data.json history.json
          
          # Jika tidak ada perubahan, tidak akan error
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan data untuk di-commit."
          else
            git commit -m "Auto-update artifact data & history [skip ci]"
            git push origin main
          fi
